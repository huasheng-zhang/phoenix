# Phoenix Agent Configuration Example
# Copy this to ~/.phoenix/config.yaml and customize

# LLM Provider Configuration
provider:
  # Provider type: "openai", "anthropic", or "openai-compatible"
  type: "openai"

  # Model name
  model: "gpt-4o"

  # API key (or use PHOENIX_API_KEY environment variable)
  api_key: "${PHOENIX_API_KEY}"

  # Base URL for OpenAI-compatible APIs (optional)
  # base_url: "https://api.openai.com/v1"

  # Max tokens per response
  max_tokens: 8192

  # Request timeout in seconds
  timeout: 120

# Agent Behavior
agent:
  # Maximum tool call iterations per turn
  max_iterations: 50

  # Sampling temperature (0.0 - 2.0)
  temperature: 0.7

  # Max retries on API errors
  max_retry: 3

  # Delay between retries (seconds)
  retry_delay: 1.0

  # System prompt
  system_prompt: |
    You are a helpful AI assistant named Phoenix. You have access to various
    tools that you can use to help the user. Be concise and focused in your
    responses. When you need to perform an action, use the provided tools.

  # Enable streaming responses
  stream: true

  # Show thinking/reasoning in output
  show_thinking: false

  # Context window management (prevent context overflow)
  # max_history_messages: 100          # Keep at most N messages in context
  # max_context_tokens: 0             # 0 = auto (70% of model context window minus overhead).
                                      # Set explicitly e.g. 100000 to override.

  # Memory system (persistent cross-session knowledge)
  # memory_enabled: true               # Enable/disable memory system
  # max_memory_tokens: 2000            # Max tokens for memory in system prompt (0=unlimited)
  # auto_save_threshold: 0             # Auto-save last N messages as memories (0=disabled)

# Tool Configuration
tools:
  # Enabled tool categories
  enabled:
    - "file"
    - "web"
    - "system"
    - "utility"

  # Disabled tools (takes precedence over enabled)
  disabled: []

  # Sandbox path for file operations (optional)
  sandbox_path: null

  # Allow destructive operations (use with caution!)
  allow_destructive: false

  # Max file size for read operations (bytes)
  max_file_size: 10485760  # 10MB

# Web Search Configuration
# Built-in provider: tavily (requires API key, free tier: 1000 queries/month)
#   Get your key at: https://tavily.com — set TAVILY_API_KEY env var or api_key below
# Alternative: duckduckgo (free, no API key needed, but results may be less accurate)
# Alternative: custom (your own search API endpoint)
web_search:
  # Provider: "tavily" (default), "duckduckgo", or "custom"
  provider: "tavily"

  # API key — Tavily: set TAVILY_API_KEY env var (recommended) or put here
  # api_key: ""

  # Max results per search (default: 5)
  max_results: 5

  # Search depth: "basic" (fast) or "advanced" (deeper, more tokens) — Tavily only
  search_depth: "basic"

  # ---- Custom provider settings (provider: "custom") ----
  # custom_endpoint: "https://your-search-api.example.com/search"
  # custom_api_key_name: "api_key"  # Field name for the API key in the request body

# Storage Configuration
storage:
  # Database path
  db_path: "~/.phoenix/phoenix.db"

  # History directory
  history_dir: "~/.phoenix/history"

  # Max history entries to keep
  max_history: 100

# ============================================================================
# Channel Configuration (chat platform integrations)
# Run:  phoenix serve
# ============================================================================
channels:
  # HTTP server settings for the webhook receiver
  server:
    host: "0.0.0.0"
    port: 8080

  # --------------------------------------------------------------------------
  # Web UI (built-in chat interface)
  # --------------------------------------------------------------------------
  # The Web UI is always available at http://<host>:<port>/ when the server
  # is running.  No separate channel enable is required.
  #
  # To protect the Web UI with a Bearer token (recommended for remote access):
  #   web:
  #     token: "your-secret-token-here"
  #
  # Then access the UI and enter the token when prompted.
  # --------------------------------------------------------------------------
  # web:
  #   token: ""  # Optional: Bearer token for Web UI authentication

  # --------------------------------------------------------------------------
  # DingTalk (钉钉) — 推荐使用 stream 模式（长连接，不需要公网地址）
  # --------------------------------------------------------------------------
  # Three modes:
  #   webhook  — Custom Robot (自定义机器人); outbound only via webhook_url.
  #              No server needed.  Optionally restrict by keyword/secret.
  #   internal — Enterprise internal bot; bi-directional via HTTP callback.
  #              Requires app_key / app_secret / agent_id and an HTTPS callback URL.
  #   stream   — Enterprise internal bot; bi-directional via WebSocket.
  #              Requires client_id / client_secret. Supports file transfer.
  # --------------------------------------------------------------------------
  dingtalk:
    enabled: false
    mode: "stream"                        # webhook | internal | stream

    # ---- stream mode (长连接，推荐！不需要公网 HTTPS 地址) ----
    client_id: ""                         # 应用 Client ID (= app_key)
    client_secret: ""                      # 应用 Client Secret
    # robot_code: ""                       # 机器人标识码（在开发者后台"机器人与消息推送"页面查看，不同于 client_id）

    # ---- webhook mode (推送模式，只能发不能收) ----
    # webhook_url: "https://oapi.dingtalk.com/robot/send?access_token=YOUR_TOKEN"
    # secret: ""

    # ---- internal mode (HTTP 回调，需要公网 HTTPS 地址) ----
    # app_key: "dingXXXXXXXXXXXXXXXX"
    # app_secret: "YOUR_APP_SECRET"
    # webhook_path: /dingtalk/webhook

    # ---- file transfer (stream mode only) ----
    # download_dir: "~/.phoenix/downloads"  # 接收文件的保存目录

  # --------------------------------------------------------------------------
  # WeChat (微信)
  # --------------------------------------------------------------------------
  # Three modes:
  #   wecom_webhook — WeCom group robot (企业微信群机器人); outbound only.
  #   wecom_app     — WeCom self-built app (企业微信自建应用); bi-directional.
  #   mp            — WeChat Official Account (公众号); bi-directional.
  # --------------------------------------------------------------------------
  wechat:
    enabled: false
    mode: "wecom_webhook"                 # wecom_webhook | wecom_app | mp

    # ---- wecom_webhook mode ----
    webhook_url: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=YOUR_KEY"

    # ---- wecom_app mode ----
    # corp_id: "wwXXXXXXXXXXXXXXXX"
    # corp_secret: "YOUR_CORP_SECRET"
    # agent_id: 1000001
    # token: "YOUR_TOKEN"
    # encoding_aes_key: "YOUR_AES_KEY"
    # webhook_path: /wechat/webhook

    # ---- mp mode ----
    # app_id: "wxXXXXXXXXXXXXXXXX"
    # app_secret: "YOUR_MP_SECRET"
    # token: "YOUR_TOKEN"
    # webhook_path: /wechat/webhook

  # --------------------------------------------------------------------------
  # QQ  (via OneBot v11 — go-cqhttp / NapCat / LLOneBot / Lagrange)
  # --------------------------------------------------------------------------
  # Steps:
  #   1. Install and configure go-cqhttp (or equivalent).
  #   2. Enable the HTTP API (default port 5700) and HTTP POST listener.
  #   3. Set the HTTP POST URL to  http://YOUR_SERVER:8080/qq/webhook
  #   4. Fill in the settings below.
  # --------------------------------------------------------------------------
  qq:
    enabled: false
    api_url: "http://127.0.0.1:5700"      # go-cqhttp HTTP API URL
    access_token: ""                      # Optional: HTTP API access token
    webhook_path: /qq/webhook             # Phoenix listens here
    self_id: 0                            # Bot's QQ number (for @-detection)
    superusers: []                        # QQ numbers with admin access
    command_prefix: "/"

  # --------------------------------------------------------------------------
  # Telegram
  # --------------------------------------------------------------------------
  # Two modes:
  #   webhook  — Telegram POSTs updates to Phoenix (needs public HTTPS URL).
  #              Set the webhook once:
  #                curl "https://api.telegram.org/bot<TOKEN>/setWebhook?url=https://YOUR_DOMAIN/telegram/webhook&secret_token=YOUR_SECRET"
  #   polling  — Phoenix polls Telegram (no public URL required; good for dev).
  # --------------------------------------------------------------------------
  telegram:
    enabled: false
    bot_token: "123456789:AAXXXXXXXXXXXXXXXXXX"
    mode: "webhook"                       # webhook | polling
    webhook_path: /telegram/webhook
    webhook_secret: ""                    # IMPORTANT: set this for webhook mode!
                                            # Must match the secret_token in setWebhook call
    superusers: []                        # Telegram user IDs with admin access
    command_prefix: "/"

# ============================================================================
# Skill Configuration (extensible capability bundles)
# ============================================================================
# Skills are auto-discovered from:
#   ~/.phoenix/skills/       (user-level, all projects)
#   ./skills/                (project-level, current directory)
#
# Set PHOENIX_SKILL_PATHS env var to add extra search paths (semicolon on Windows).
#
# CLI:
#   phoenix skill list              # list all skills
#   phoenix skill show <name>       # show skill details
#   phoenix skill create <name>     # scaffold a new skill
#
# When a user message matches a skill's trigger patterns, the skill is
# automatically activated for that turn (its system prompt and tools are
# injected into the agent loop).
# ============================================================================
skills:
  # Enable auto-matching (default: true)
  auto_match: true

  # Extra skill search directories
  # extra_paths:
  #   - /path/to/my/skills

# Skill-specific settings overrides (optional)
# settings:
#   my-skill:
#     max_rows: 5000

# ============================================================================
# Scheduler Configuration (cron-based automated tasks)
# ============================================================================
# Phoenix Agent can run scheduled tasks at specified times using cron syntax.
# When a task fires, the agent executes the configured prompt and pushes
# the result to the specified channel/chat_id.
#
# Hot-reload: Tasks added/removed via the Agent (add_scheduled_task /
# remove_scheduled_task tools) take effect immediately without server restart.
# External config.yaml edits are synced on next Phoenix restart or reload.
# ============================================================================
# scheduler:
#   enabled: true
#   timezone: Asia/Shanghai
#   tasks:
#     # Example 1: Daily weather briefing at 09:00 on weekdays
#     - name: "daily-weather"
#       cron: "0 9 * * 1-5"
#       prompt: "查询深圳今天天气，生成简短摘要，列出穿衣建议"
#       channel: dingtalk
#       chat_id: "your_chat_id@chat"
#       skill: null
#
#     # Example 2: Every 2-hour heartbeat check
#     - name: "heartbeat-check"
#       cron: "0 */2 * * *"
#       prompt: "检查系统健康状态，如果有问题请报警"
#       channel: dingtalk
#       chat_id: "your_chat_id@chat"
#       skill: null
#
#     # Example 3: Weekly summary every Monday at 10:00
#     - name: "weekly-summary"
#       cron: "0 10 * * 1"
#       prompt: "生成本周工作摘要，列出已完成事项和下周计划"
#       channel: dingtalk
#       chat_id: "your_chat_id@chat"
#       skill: null
#
# Supported channels: dingtalk / wechat / telegram / qq
# Cron format: minute hour day month weekday
#   minute:  0-59
#   hour:    0-23
#   day:     1-31
#   month:   1-12
#   weekday: 0-6 (0=Sunday, 1=Monday, ..., 6=Saturday)

# ============================================================================
# Multi-Agent Collaboration (Supervisor + Worker Roles)
# ============================================================================
# The main Phoenix Agent acts as a Supervisor that can delegate tasks to
# specialist worker agents. Each worker has its own system prompt, tool set,
# model, and iteration limits.
#
# Role discovery (priority: config.yaml overrides YAML files for same name):
#   1. ~/.phoenix/roles/*.yaml   (user-level, shared across all projects)
#   2. ./roles/*.yaml            (project-level, current directory)
#   3. agent_roles section below (inline in config.yaml)
#
# The main agent uses these tools for delegation:
#   list_agent_roles       — List available specialist roles
#   delegate_to_agent      — Delegate a full task to a specialist (with tool use)
#   ask_agent              — Quick consultation without tool iteration
#
# Built-in role files (included in ./roles/):
#   researcher.yaml  — Web search, information gathering, fact verification
#   coder.yaml       — Write, debug, and refactor code
#   reviewer.yaml    — Code review: correctness, security, performance, style
#   writer.yaml      — Technical docs, README, guides, blog posts
#   analyst.yaml     — Log analysis, metrics, trend identification
#   devops.yaml      — Server administration, deployment, CI/CD, monitoring
#   translator.yaml  — Translation (中/英/日), localization, UI strings
#   summarizer.yaml  — Condense long content into structured summaries
#   tester.yaml      — Write, run, and debug test suites
#   planner.yaml     — Architecture design, task decomposition, tech strategy
#
# To create a custom role, add a YAML file to ./roles/ or ~/.phoenix/roles/:
#   name: my-role
#   description: "What this role does"
#   system_prompt: |
#     You are a specialist that...
#   tools: [read_file, run_command, ...]
#   model: null           # null = use default model from provider config
#   max_iterations: 20   # null = use agent default
#   temperature: 0.3     # null = use agent default
# ============================================================================

# Uncomment below to define roles inline (or just use the YAML files in ./roles/):
# agent_roles:
#   my-custom-role:
#     description: "A custom specialist for my specific use case"
#     system_prompt: |
#       You are a specialist that handles...
#     tools:
#       - read_file
#       - run_command
#     model: null
#     max_iterations: 15
#     temperature: 0.3


