<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenix Agent</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--border:#30363d;
  --text:#c9d1d9;--text-dim:#8b949e;--text-bright:#f0f6fc;
  --accent:#58a6ff;--accent-hover:#79c0ff;
  --user-bg:#1f3a5f;--user-border:#2d5a8e;
  --bot-bg:#21262d;--bot-border:#30363d;
  --danger:#f85149;--success:#3fb950;--warning:#d29922;
  --radius:12px;--radius-sm:8px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6}
a{color:var(--accent);text-decoration:none}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* --- Layout --- */
.app{display:flex;flex-direction:column;height:100vh;max-width:960px;margin:0 auto}

/* --- Header --- */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;border-bottom:1px solid var(--border);
  background:var(--surface);flex-shrink:0;
}
.header h1{font-size:18px;font-weight:600;color:var(--text-bright)}
.header h1 span{color:var(--accent)}
.header-actions{display:flex;gap:8px}
.btn{
  padding:6px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--surface);color:var(--text);cursor:pointer;font-size:13px;
  font-family:var(--font);transition:all .15s;
}
.btn:hover{background:var(--border);color:var(--text-bright)}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-accent:hover{background:var(--accent-hover)}
.btn-danger{border-color:var(--danger);color:var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}

/* --- Messages --- */
.messages{
  flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;
}
.message{display:flex;gap:10px;max-width:85%;animation:fadeIn .2s ease}
.message.user{align-self:flex-end;flex-direction:row-reverse}
.message-avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:14px;
  font-weight:600;
}
.message.user .message-avatar{background:var(--user-bg);color:var(--accent)}
.message.assistant .message-avatar{background:var(--accent);color:#fff}
.message-bubble{
  padding:10px 16px;border-radius:var(--radius);
  font-size:14px;line-height:1.7;word-break:break-word;
}
.message.user .message-bubble{
  background:var(--user-bg);border:1px solid var(--user-border);
  border-top-right-radius:4px;color:var(--text-bright);
}
.message.assistant .message-bubble{
  background:var(--bot-bg);border:1px solid var(--bot-border);
  border-top-left-radius:4px;
}
.message-bubble p{margin:6px 0}
.message-bubble p:first-child{margin-top:0}
.message-bubble p:last-child{margin-bottom:0}
.message-bubble code{
  background:rgba(110,118,129,.2);padding:2px 6px;border-radius:4px;
  font-family:var(--mono);font-size:13px;
}
.message-bubble pre{
  background:#0d1117;border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px;margin:8px 0;overflow-x:auto;
}
.message-bubble pre code{background:none;padding:0;font-size:13px;color:var(--text)}
.message-time{font-size:11px;color:var(--text-dim);margin-top:4px;text-align:right}
.message.user .message-time{text-align:left}

/* --- Typing indicator --- */
.typing{
  display:flex;gap:10px;max-width:85%;align-items:center;
}
.typing-avatar{
  width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:14px;
}
.typing-dots{
  background:var(--bot-bg);border:1px solid var(--bot-border);
  border-radius:var(--radius);padding:12px 20px;display:flex;gap:5px;
}
.typing-dots span{
  width:8px;height:8px;border-radius:50%;background:var(--text-dim);
  animation:bounce .6s infinite alternate;
}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{to{transform:translateY(-6px);opacity:.4}}

/* --- Input area --- */
.input-area{
  padding:16px 20px;border-top:1px solid var(--border);
  background:var(--surface);flex-shrink:0;
}
.input-wrapper{
  display:flex;gap:10px;align-items:flex-end;
}
.input-wrapper textarea{
  flex:1;resize:none;border:1px solid var(--border);border-radius:var(--radius);
  background:var(--bg);color:var(--text);padding:12px 16px;font-size:14px;
  font-family:var(--font);line-height:1.5;max-height:150px;min-height:44px;
  transition:border-color .15s;
}
.input-wrapper textarea:focus{outline:none;border-color:var(--accent)}
.input-wrapper textarea::placeholder{color:var(--text-dim)}
.send-btn{
  width:44px;height:44px;border:none;border-radius:var(--radius);
  background:var(--accent);color:#fff;cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;flex-shrink:0;
}
.send-btn:hover{background:var(--accent-hover)}
.send-btn:disabled{opacity:.4;cursor:not-allowed}

/* --- Status bar --- */
.status-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 20px;border-top:1px solid var(--border);
  font-size:12px;color:var(--text-dim);background:var(--surface);
}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.status-dot.online{background:var(--success)}
.status-dot.offline{background:var(--danger)}

/* --- Empty state --- */
.empty-state{
  flex:1;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;color:var(--text-dim);
}
.empty-state .icon{font-size:48px;opacity:.3}
.empty-state p{font-size:14px}

/* --- Responsive --- */
@media(max-width:640px){
  .header{padding:10px 14px}
  .messages{padding:14px}
  .input-area{padding:12px 14px}
  .message{max-width:92%}
}

/* --- Markdown rendering helpers --- */
.msg-content ul,.msg-content ol{padding-left:20px;margin:6px 0}
.msg-content li{margin:2px 0}
.msg-content h1,.msg-content h2,.msg-content h3{margin:12px 0 6px;color:var(--text-bright)}
.msg-content blockquote{border-left:3px solid var(--accent);padding-left:12px;margin:8px 0;color:var(--text-dim)}
.msg-content table{border-collapse:collapse;margin:8px 0;width:100%}
.msg-content th,.msg-content td{border:1px solid var(--border);padding:6px 10px;font-size:13px}
.msg-content th{background:var(--surface);color:var(--text-bright)}
.msg-content a{color:var(--accent);text-decoration:underline}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* --- Command confirmation card --- */
.confirm-card{
  background:rgba(210,153,34,.08);border:1px solid var(--warning);
  border-radius:var(--radius);padding:12px 16px;margin:8px 0;
}
.confirm-card .confirm-cmd{
  font-family:var(--mono);font-size:13px;background:var(--bg);
  padding:6px 10px;border-radius:6px;margin:6px 0;word-break:break-all;
  color:var(--text-bright);
}
.confirm-card .confirm-label{
  font-size:13px;color:var(--warning);font-weight:600;margin-bottom:4px;
}
.confirm-actions{display:flex;gap:8px;margin-top:8px}
.btn-confirm{
  padding:6px 16px;border:none;border-radius:var(--radius-sm);
  background:var(--warning);color:#000;cursor:pointer;font-size:13px;
  font-weight:600;transition:all .15s;
}
.btn-confirm:hover{background:#e3b341}
.btn-cancel-confirm{
  padding:6px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);
  background:transparent;color:var(--text-dim);cursor:pointer;font-size:13px;
  transition:all .15s;
}
.btn-cancel-confirm:hover{background:var(--border);color:var(--text)}

/* --- File upload --- */
.file-attachment{
  display:flex;align-items:center;gap:8px;padding:6px 12px;
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);
  margin:4px 0;font-size:13px;color:var(--text);max-width:300px;
}
.file-attachment .file-icon{font-size:16px;flex-shrink:0}
.file-attachment .file-info{flex:1;min-width:0}
.file-attachment .file-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-bright)}
.file-attachment .file-size{font-size:11px;color:var(--text-dim)}
.file-attachment .file-remove{
  cursor:pointer;color:var(--text-dim);font-size:14px;padding:0 4px;
  flex-shrink:0;transition:color .15s;
}
.file-attachment .file-remove:hover{color:var(--danger)}
.file-attachment img.file-thumb{
  width:36px;height:36px;object-fit:cover;border-radius:4px;flex-shrink:0;
}
.attachment-preview{
  display:flex;flex-wrap:wrap;gap:6px;padding:8px 20px 0;
}
.file-drop-highlight{
  border:2px dashed var(--accent)!important;background:rgba(88,166,255,.05)!important;
}
.msg-attachment{
  display:inline-flex;align-items:center;gap:6px;padding:4px 10px;
  background:var(--bg);border:1px solid var(--border);border-radius:6px;
  font-size:13px;margin-top:6px;
}
.msg-attachment a{color:var(--accent);text-decoration:none}
.msg-attachment a:hover{text-decoration:underline}
.msg-attachment img.msg-thumb{
  width:32px;height:32px;object-fit:cover;border-radius:4px;
}

/* --- File panel --- */
.file-panel-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.5);z-index:100;display:none;
}
.file-panel-overlay.open{display:flex;justify-content:flex-end}
.file-panel{
  width:340px;max-width:90vw;height:100%;
  background:var(--surface);border-left:1px solid var(--border);
  display:flex;flex-direction:column;animation:slideIn .2s ease;
}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.file-panel-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--border);
  font-size:15px;font-weight:600;color:var(--text-bright);
}
.file-panel-close{
  background:none;border:none;color:var(--text-dim);font-size:20px;
  cursor:pointer;padding:0 4px;line-height:1;
}
.file-panel-close:hover{color:var(--text)}
.file-panel-list{
  flex:1;overflow-y:auto;padding:8px;
}
.file-panel-item{
  display:flex;align-items:center;gap:10px;padding:8px 10px;
  border-radius:var(--radius-sm);cursor:pointer;transition:background .1s;
}
.file-panel-item:hover{background:var(--bg)}
.file-panel-item .fp-icon{font-size:20px;flex-shrink:0}
.file-panel-item .fp-info{flex:1;min-width:0}
.file-panel-item .fp-name{
  font-size:13px;color:var(--text-bright);overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;
}
.file-panel-item .fp-meta{font-size:11px;color:var(--text-dim)}
.file-panel-item .fp-dl{
  color:var(--accent);font-size:14px;flex-shrink:0;opacity:.6;
  transition:opacity .15s;
}
.file-panel-item:hover .fp-dl{opacity:1}
.file-panel-empty{
  padding:40px 20px;text-align:center;color:var(--text-dim);font-size:13px;
}

/* --- Sent file card (agent sends to user) --- */
.sent-file-card{
  display:inline-flex;align-items:center;gap:10px;padding:10px 14px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);margin-top:8px;max-width:340px;
}
.sent-file-card .sfc-icon{font-size:28px;flex-shrink:0}
.sent-file-card .sfc-info{flex:1;min-width:0}
.sent-file-card .sfc-name{
  font-size:13px;color:var(--text-bright);overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;
}
.sent-file-card .sfc-size{font-size:11px;color:var(--text-dim)}
.sent-file-card .sfc-dl{
  display:inline-flex;align-items:center;gap:4px;padding:4px 12px;
  background:var(--accent);color:#fff;border-radius:var(--radius-sm);
  font-size:12px;text-decoration:none;flex-shrink:0;transition:background .15s;
}
.sent-file-card .sfc-dl:hover{background:var(--accent-hover)}
.sent-file-card img.sfc-thumb{
  width:40px;height:40px;object-fit:cover;border-radius:6px;flex-shrink:0;
}
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <h1>&#x2728; <span>Phoenix</span> Agent</h1>
    <div class="header-actions">
      <button class="btn" onclick="openFilePanel()" title="File manager">&#x1f4c1; Files</button>
      <button class="btn" onclick="loadHistory()" title="Load history">&#x1f504;</button>
      <button class="btn btn-danger" onclick="newSession()" title="New session">&#x2795; New</button>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="icon">&#x2728;</div>
      <p>Send a message to start chatting with Phoenix Agent</p>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="attachment-preview" id="attachmentPreview"></div>
    <div class="input-wrapper">
      <input type="file" id="fileInput" style="display:none" multiple accept=".txt,.md,.csv,.json,.yaml,.yml,.toml,.py,.js,.ts,.html,.css,.sh,.bat,.log,.sql,.conf,.cfg,.ini,.png,.jpg,.jpeg,.gif,.webp,.svg,.pdf,.doc,.docx,.xls,.xlsx,.zip,.tar,.gz">
      <button class="send-btn" style="background:transparent;border:1px solid var(--border);color:var(--text-dim)" onclick="document.getElementById('fileInput').click()" title="Attach file">&#x1f4c2;</button>
      <textarea id="userInput" rows="1" placeholder="Type your message... (drop files here)" autofocus></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">&#x27a4;</button>
    </div>
  </div>

  <!-- Status -->
  <div class="status-bar">
    <span><span class="status-dot online" id="statusDot"></span><span id="statusText">Connected</span></span>
    <span id="modelInfo"></span>
  </div>
  <!-- File panel overlay -->
  <div class="file-panel-overlay" id="filePanelOverlay" onclick="closeFilePanel()">
    <div class="file-panel" onclick="event.stopPropagation()">
      <div class="file-panel-header">
        <span>&#x1f4c1; Files</span>
        <button class="file-panel-close" onclick="closeFilePanel()">&times;</button>
      </div>
      <div class="file-panel-list" id="filePanelList">
        <div class="file-panel-empty">Loading...</div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  // --- State ---
  let sessionId = sessionStorage.getItem('phoenix_session') || '';
  let isLoading = false;
  let pendingFiles = [];  // [{file_id, filename, file_type, size, file_path, download_url}]
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const emptyState = document.getElementById('emptyState');
  const fileInput = document.getElementById('fileInput');
  const attachmentPreview = document.getElementById('attachmentPreview');

  // --- Helpers ---
  function getNow() {
    return new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
  }

  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // --- File upload ---
  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function renderAttachmentPreview() {
    if (pendingFiles.length === 0) {
      attachmentPreview.innerHTML = '';
      return;
    }
    let html = '';
    for (let i = 0; i < pendingFiles.length; i++) {
      const f = pendingFiles[i];
      const thumbHtml = f.file_type === 'image'
        ? '<img class="file-thumb" src="' + f.download_url + '" alt="">'
        : '<span class="file-icon">\u{1f4c4}</span>';
      html += '<div class="file-attachment">'
        + thumbHtml
        + '<div class="file-info"><div class="file-name">' + escHtml(f.filename) + '</div>'
        + '<div class="file-size">' + formatSize(f.size) + '</div></div>'
        + '<span class="file-remove" onclick="removePendingFile(' + i + ')">\u2716</span>'
        + '</div>';
    }
    attachmentPreview.innerHTML = html;
  }

  window.removePendingFile = function(idx) {
    pendingFiles.splice(idx, 1);
    renderAttachmentPreview();
  };

  async function uploadFile(file) {
    const formData = new FormData();
    formData.append('file', file);
    try {
      const headers = {};
      const token = sessionStorage.getItem('phoenix_token');
      if (token) headers['Authorization'] = 'Bearer ' + token;
      const resp = await fetch('/api/upload', {method: 'POST', headers, body: formData});
      if (!resp.ok) {
        const err = await resp.json();
        console.error('Upload failed:', err.error);
        return null;
      }
      return await resp.json();
    } catch(e) {
      console.error('Upload error:', e);
      return null;
    }
  }

  fileInput.addEventListener('change', async function() {
    const files = fileInput.files;
    if (!files || files.length === 0) return;
    for (const f of files) {
      const result = await uploadFile(f);
      if (result) pendingFiles.push(result);
    }
    renderAttachmentPreview();
    fileInput.value = '';  // reset so same file can be re-selected
  });

  // Drag & drop on textarea
  inputEl.addEventListener('dragover', function(e) {
    e.preventDefault();
    inputEl.classList.add('file-drop-highlight');
  });
  inputEl.addEventListener('dragleave', function() {
    inputEl.classList.remove('file-drop-highlight');
  });
  inputEl.addEventListener('drop', async function(e) {
    e.preventDefault();
    inputEl.classList.remove('file-drop-highlight');
    const files = e.dataTransfer.files;
    if (!files || files.length === 0) return;
    for (const f of files) {
      const result = await uploadFile(f);
      if (result) pendingFiles.push(result);
    }
    renderAttachmentPreview();
  });

  function simpleMarkdown(text) {
    // Code blocks
    text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
      return '<pre><code>' + escHtml(code.trim()) + '</code></pre>';
    });
    // Inline code
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Bold
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic
    text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // Headers
    text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    // Blockquote
    text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
    // Unordered list
    text = text.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
    text = text.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
    // Links
    text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
    // Paragraphs (double newline)
    text = text.replace(/\n\n/g, '</p><p>');
    // Single newline
    text = text.replace(/\n/g, '<br>');
    text = '<p>' + text + '</p>';
    text = text.replace(/<p><\/p>/g, '');
    return text;
  }

  function addMessage(role, content, attachmentHtml) {
    if (emptyState) emptyState.style.display = 'none';
    const div = document.createElement('div');
    div.className = 'message ' + role;
    const avatar = role === 'user' ? 'U' : 'P';
    let rendered = simpleMarkdown(content);
    if (attachmentHtml) rendered += attachmentHtml;

    div.innerHTML = '\
      <div class="message-avatar">' + avatar + '</div>\
      <div>\
        <div class="message-bubble msg-content">' + rendered + '</div>\
        <div class="message-time">' + getNow() + '</div>\
      </div>\
    ';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  // --- File panel ---
  function formatDate(ts) {
    const d = new Date(ts * 1000);
    const pad = n => String(n).padStart(2, '0');
    return pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  }

  window.openFilePanel = async function() {
    document.getElementById('filePanelOverlay').classList.add('open');
    const listEl = document.getElementById('filePanelList');
    listEl.innerHTML = '<div class="file-panel-empty">Loading...</div>';
    try {
      const token = sessionStorage.getItem('phoenix_token');
      const headers = {};
      if (token) headers['Authorization'] = 'Bearer ' + token;
      const resp = await fetch('/api/files', {headers});
      if (!resp.ok) {
        listEl.innerHTML = '<div class="file-panel-empty">Failed to load files</div>';
        return;
      }
      const data = await resp.json();
      const files = data.files || [];
      if (files.length === 0) {
        listEl.innerHTML = '<div class="file-panel-empty">No files yet.<br>Upload files or ask the agent to send you files.</div>';
        return;
      }
      let html = '';
      for (const f of files) {
        const icon = f.type === 'image' ? '\u{1f5bc}\ufe0f' : '\u{1f4c4}';
        html += '<a class="file-panel-item" href="' + escHtml(f.download_url) + '" target="_blank">'
          + '<span class="fp-icon">' + icon + '</span>'
          + '<div class="fp-info"><div class="fp-name">' + escHtml(f.name) + '</div>'
          + '<div class="fp-meta">' + formatSize(f.size) + ' &middot; ' + formatDate(f.modified) + '</div></div>'
          + '<span class="fp-dl">\u2913</span>'
          + '</a>';
      }
      listEl.innerHTML = html;
    } catch(e) {
      listEl.innerHTML = '<div class="file-panel-empty">Error loading files</div>';
    }
  };

  window.closeFilePanel = function() {
    document.getElementById('filePanelOverlay').classList.remove('open');
  };

  // --- Render sent file card (from agent) ---
  function renderSentFileCard(tr) {
    const icon = tr.metadata.file_type === 'image'
      ? '<img class="sfc-thumb" src="' + escHtml(tr.metadata.download_url) + '" alt="">'
      : '<span class="sfc-icon">\u{1f4c4}</span>';
    return '<div class="sent-file-card">'
      + icon
      + '<div class="sfc-info"><div class="sfc-name">' + escHtml(tr.metadata.filename) + '</div>'
      + '<div class="sfc-size">' + formatSize(tr.metadata.size) + '</div></div>'
      + '<a class="sfc-dl" href="' + escHtml(tr.metadata.download_url) + '" download="\u200b">\u2913 Download</a>'
      + '</div>';
  }

  function renderConfirmCard(cmd) {
    const id = 'confirm-' + Date.now();
    // Store command on the card element so handleConfirm can read it
    window['__confirmCmd_' + id] = cmd;
    return '\
      <div class="confirm-card" id="' + id + '">\
        <div class="confirm-label">&#9888;&#65039; Command Requires Confirmation</div>\
        <div class="confirm-cmd">' + escHtml(cmd) + '</div>\
        <div class="confirm-actions">\
          <button class="btn-confirm" onclick="handleConfirm(\'' + id + '\')">&#9654; Execute</button>\
          <button class="btn-cancel-confirm" onclick="handleCancel(\'' + id + '\')">Cancel</button>\
        </div>\
      </div>\
    ';
  }

  window.handleConfirm = async function(cardId) {
    const card = document.getElementById(cardId);
    if (!card) return;
    card.querySelectorAll('button').forEach(b => { b.disabled = true; b.style.opacity = '0.5'; });
    const confirmMsg = window['__confirmCmd_' + cardId] || card.querySelector('.confirm-cmd').textContent;
    inputEl.value = 'confirm: ' + confirmMsg;
    sendMessage();
  };

  window.handleCancel = function(cardId) {
    const card = document.getElementById(cardId);
    if (card) {
      card.innerHTML = '<span style="color:var(--text-dim);font-size:13px">&#x2716; Cancelled</span>';
    }
  };

  function addTyping() {
    if (emptyState) emptyState.style.display = 'none';
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typingIndicator';
    div.innerHTML = `
      <div class="typing-avatar">P</div>
      <div class="typing-dots"><span></span><span></span><span></span></div>
    `;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  function setLoading(loading) {
    isLoading = loading;
    sendBtn.disabled = loading;
    inputEl.disabled = loading;
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    if (loading) {
      dot.className = 'status-dot';
      dot.style.background = 'var(--warning)';
      txt.textContent = 'Thinking...';
    } else {
      dot.className = 'status-dot online';
      dot.style.background = '';
      txt.textContent = 'Connected';
    }
  }

  // --- API ---
  async function apiCall(endpoint, body) {
    const headers = {'Content-Type': 'application/json'};
    const token = sessionStorage.getItem('phoenix_token');
    if (token) headers['Authorization'] = 'Bearer ' + token;
    const resp = await fetch(endpoint, {method:'POST', headers, body: JSON.stringify(body)});
    if (resp.status === 401) throw new Error('Unauthorized');
    return resp;
  }

  // --- Send message (SSE streaming) ---
  window.sendMessage = async function() {
    const text = inputEl.value.trim();
    if (!text && pendingFiles.length === 0) return;
    if (isLoading) return;

    // Build attachment HTML for the user message bubble
    let attachmentHtml = '';
    if (pendingFiles.length > 0) {
      for (const f of pendingFiles) {
        if (f.file_type === 'image') {
          attachmentHtml += '<div class="msg-attachment"><a href="' + f.download_url + '" target="_blank"><img class="msg-thumb" src="' + f.download_url + '" alt="' + escHtml(f.filename) + '"></a><a href="' + f.download_url + '" target="_blank">' + escHtml(f.filename) + '</a></div>';
        } else {
          attachmentHtml += '<div class="msg-attachment">\u{1f4c4} <a href="' + f.download_url + '" target="_blank">' + escHtml(f.filename) + ' (' + formatSize(f.size) + ')</a></div>';
        }
      }
    }

    // Add user message with attachments
    const displayText = text || (pendingFiles.length > 0 ? '\u{1f4c2} Sent ' + pendingFiles.length + ' file(s)' : '');
    addMessage('user', displayText, attachmentHtml);

    inputEl.value = '';
    autoResize();

    // Capture and clear pending files
    const attachments = [...pendingFiles];
    pendingFiles = [];
    renderAttachmentPreview();

    setLoading(true);
    addTyping();

    try {
      const body = {message: text, session_id: sessionId};
      if (attachments.length > 0) body.attachments = attachments;
      const resp = await apiCall('/api/chat/stream', body);
      if (!resp.ok) {
        removeTyping();
        const err = await resp.text();
        addMessage('assistant', '⚠️ Error: ' + err);
        setLoading(false);
        return;
      }

      removeTyping();
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let fullContent = '';
      let confirmCardShown = false;  // track if a confirmation card is active
      let bubble = addMessage('assistant', '');
      const bubbleContent = bubble.querySelector('.msg-content');

      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, {stream: true});
        const lines = chunk.split('\n');
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6);
          if (data === '[DONE]') break;
          try {
            const parsed = JSON.parse(data);
            if (parsed.tool_result) {
              const tr = parsed.tool_result;
              if (tr.metadata && tr.metadata.needs_confirmation && tr.metadata.command) {
                let html = fullContent ? simpleMarkdown(fullContent) : '';
                html += renderConfirmCard(tr.metadata.command);
                bubbleContent.innerHTML = html;
                confirmCardShown = true;
              } else if (tr.metadata && tr.metadata.send_file) {
                // Agent sent a file — render as download card
                let html = fullContent ? simpleMarkdown(fullContent) : '';
                html += renderSentFileCard(tr);
                bubbleContent.innerHTML = html;
                fullContent += '\n\n[File: ' + (tr.metadata.filename || 'file') + ']';
              } else {
                const info = tr.success
                  ? '\u2705 ' + (tr.tool_name || 'tool') + ' executed'
                  : '\u26a0\ufe0f ' + (tr.error || (tr.tool_name || 'tool') + ' failed');
                fullContent += '\n\n' + info;
                if (confirmCardShown) {
                  const card = bubbleContent.querySelector('.confirm-card');
                  const cardHtml = card ? card.outerHTML : '';
                  bubbleContent.innerHTML = simpleMarkdown(fullContent) + cardHtml;
                } else {
                  bubbleContent.innerHTML = simpleMarkdown(fullContent);
                }
              }
              messagesEl.scrollTop = messagesEl.scrollHeight;
            } else if (parsed.error) {
              if (confirmCardShown) {
                const card = bubbleContent.querySelector('.confirm-card');
                const cardHtml = card ? card.outerHTML : '';
                bubbleContent.innerHTML = simpleMarkdown('\u26a0\ufe0f ' + parsed.error) + cardHtml;
              } else {
                bubbleContent.innerHTML = simpleMarkdown('\u26a0\ufe0f ' + parsed.error);
              }
              messagesEl.scrollTop = messagesEl.scrollHeight;
            } else if (parsed.content) {
              fullContent += parsed.content;
              if (confirmCardShown) {
                const card = bubbleContent.querySelector('.confirm-card');
                const cardHtml = card ? card.outerHTML : '';
                bubbleContent.innerHTML = simpleMarkdown(fullContent) + cardHtml;
              } else {
                bubbleContent.innerHTML = simpleMarkdown(fullContent);
              }
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }
          } catch(e) { console.error('SSE parse error', e); }
        }
      }

      if (!sessionId) {
        // Session will be created server-side, we store it
      }
    } catch (e) {
      removeTyping();
      if (e.message === 'Unauthorized') {
        addMessage('assistant', '⚠️ Unauthorized. Please provide a valid token.');
      } else {
        addMessage('assistant', '⚠️ Connection error. Please try again.');
      }
    }
    setLoading(false);
  };

  // --- New session ---
  window.newSession = async function() {
    if (isLoading) return;
    messagesEl.innerHTML = '';
    if (emptyState) {
      messagesEl.appendChild(emptyState);
      emptyState.style.display = '';
    }
    try {
      const resp = await apiCall('/api/session/new', {session_id: sessionId});
      const data = await resp.json();
      sessionId = data.session_id;
      sessionStorage.setItem('phoenix_session', sessionId);
    } catch(e) {
      // fallback
      sessionId = '';
      sessionStorage.removeItem('phoenix_session');
    }
  };

  // --- Load history ---
  window.loadHistory = async function() {
    if (isLoading || !sessionId) return;
    try {
      const token = sessionStorage.getItem('phoenix_token');
      const headers = {};
      if (token) headers['Authorization'] = 'Bearer ' + token;
      const resp = await fetch('/api/history?session_id=' + encodeURIComponent(sessionId), {headers});
      if (!resp.ok) return;
      const data = await resp.json();
      if (!data.history || data.history.length === 0) return;
      messagesEl.innerHTML = '';
      if (emptyState) {
        messagesEl.appendChild(emptyState);
        emptyState.style.display = 'none';
      }
      for (const msg of data.history) {
        if (msg.role === 'user' || msg.role === 'assistant') {
          addMessage(msg.role, msg.content);
        }
      }
    } catch(e) {}
  };

  // --- Auto-resize textarea ---
  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 150) + 'px';
  }

  // --- Keyboard ---
  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  inputEl.addEventListener('input', autoResize);

  // --- Check session ---
  if (!sessionId) {
    sessionId = 'web-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
    sessionStorage.setItem('phoenix_session', sessionId);
  }

  // --- Fetch model info ---
  (async function() {
    try {
      const resp = await fetch('/health');
      const data = await resp.json();
      if (data.service === 'phoenix-agent') {
        document.getElementById('statusDot').className = 'status-dot online';
      }
    } catch(e) {
      document.getElementById('statusDot').className = 'status-dot offline';
      document.getElementById('statusText').textContent = 'Disconnected';
    }
  })();
})();
</script>
</body>
</html>
